  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://openmeter.io/docs/getting-started/subjects
  baseURL: https://openmeter.cloud/api/v1
  properties:
  - url: https://openmeter.io/docs/getting-started/subjects
