aid: openmeter
url: https://raw.githubusercontent.com/api-evangelist/openmeter/refs/heads/main/apis.yml
name: OpenMeter
kind: company
description: OpenMeter is open-source usage metering and billing for AI and API
  products. It ingests usage events as CloudEvents, aggregates them through meters,
  answers usage queries, and turns that usage into entitlements, balances, grants,
  usage-driven notifications, and Stripe-backed billing. Available as an open-source
  project and as OpenMeter Cloud with a Bearer-token REST API at
  https://openmeter.cloud/api/v1.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Usage Metering
- Billing
- Entitlements
- CloudEvents
- Open Source
- AI
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: openmeter:openmeter-events-ingestion-api
  name: OpenMeter Events Ingestion API
  tags:
  - Events
  - Ingestion
  - CloudEvents
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://openmeter.io/docs/getting-started/ingestion
  baseURL: https://openmeter.cloud/api/v1
  properties:
  - url: https://openmeter.io/docs/getting-started/ingestion
    type: Documentation
  - url: https://openmeter.io/docs/api
    type: APIReference
  - url: openapi/openmeter-openapi.yml
    type: OpenAPI
  - url: collections/openmeter.postman_collection.json
    type: PostmanCollection
  - url: collections/openmeter.opencollection.json
    type: OpenCollection
  description: Ingests single or batched usage events that follow the CloudEvents
    1.0 specification (application/cloudevents+json and cloudevents-batch+json),
    and lists ingested events for debugging. Event id enables idempotent
    deduplication; subject attributes usage; data carries the metered payload.
- aid: openmeter:openmeter-meters-api
  name: OpenMeter Meters API
  tags:
  - Meters
  - Aggregation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://openmeter.io/docs/getting-started/meters
  baseURL: https://openmeter.cloud/api/v1
  properties:
  - url: https://openmeter.io/docs/getting-started/meters
    type: Documentation
  - url: openapi/openmeter-openapi.yml
    type: OpenAPI
  - url: collections/openmeter.postman_collection.json
    type: PostmanCollection
  - url: collections/openmeter.opencollection.json
    type: OpenCollection
  description: Create, list, get, and delete meters that aggregate CloudEvents by
    eventType using SUM, COUNT, UNIQUE_COUNT, AVG, MIN, or MAX, reading the metered
    value and group-by dimensions from event data via JSONPath.
- aid: openmeter:openmeter-usage-query-api
