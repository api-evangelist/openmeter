  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://openmeter.io/docs/getting-started/query-usage
  baseURL: https://openmeter.cloud/api/v1
  properties:
  - url: https://openmeter.io/docs/getting-started/query-usage
    type: Documentation
  - url: openapi/openmeter-openapi.yml
    type: OpenAPI
  - url: collections/openmeter.postman_collection.json
    type: PostmanCollection
  - url: collections/openmeter.opencollection.json
    type: OpenCollection
  description: Queries aggregated usage for a meter across a time range with
    MINUTE / HOUR / DAY windows, filtered and grouped by subject and custom
    groupBy dimensions, plus listing the subjects that have reported usage.
- aid: openmeter:openmeter-subjects-api
  name: OpenMeter Subjects API
  tags:
  - Subjects
